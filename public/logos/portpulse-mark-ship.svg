  <path fill="#FFFFFF" d="M36 30h22c13 0 21 9 21 19s-8 19-21 19h-10v29H36V30zm12 12v12h10c5 0 9-3 9-6s-4-6-9-6h-10z"/>

  <!-- 文字更靠近，宽度更短 -->
