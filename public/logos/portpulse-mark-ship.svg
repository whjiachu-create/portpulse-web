<!-- public/logo-lockup-compact-dark.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" role="img" aria-label="PortPulse (compact)">
  <defs>
    <style>
      .word { font: 900 80px/1 Inter, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; letter-spacing:-1.5px; }
    </style>
  </defs>

  <!-- 缩小直径的圆圈 P，整体更紧凑 -->
  <circle cx="50" cy="60" r="44" fill="#0B2740"/>
