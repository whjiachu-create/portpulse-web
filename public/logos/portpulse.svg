<svg width="260" height="48" viewBox="0 0 260 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PortPulse">
  <title>PortPulse</title>
  <defs>
    <linearGradient id="pulseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-40%" width="140%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#0EA5E9" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Icon (circle + wave + vessel dot) -->
  <g transform="translate(4,4)" filter="url(#soft)">
    <circle cx="20" cy="20" r="18" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="2.5"/>
    <path d="M6 28 Q 20 20 34 28" stroke="#0EA5E9" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="26" cy="26.5" r="3.5" fill="#10B981"/>
  </g>

  <!-- Wordmark -->
  <g font-family="Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-weight="700" font-size="20" letter-spacing=".2">
    <text x="56" y="30" fill="#0B2740">Port</text>
    <text x="96" y="30" fill="url(#pulseGrad)">Pulse</text>
  </g>

  <!-- Subtle pulse underline under 'Pulse' -->
  <path d="M94 34 C 104 30 114 30 124 34 S 144 38 156 34" stroke="#0EA5E9" stroke-width="2" fill="none" stroke-linecap="round" opacity=".9"/>

</svg>
