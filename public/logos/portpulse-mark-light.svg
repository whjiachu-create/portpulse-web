<!-- public/logo-lockup.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 120" role="img" aria-label="PortPulse">
  <defs>
    <style>
      .word { font: 900 84px/1 Inter, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- 圆圈 P（品牌海军蓝底 + 青蓝描边 + 白色 P） -->
  <circle cx="60" cy="60" r="52" fill="#0B2740"/>
  <circle cx="60" cy="60" r="52" fill="none" stroke="#0EA5E9" stroke-width="10"/>
  <text x="33" y="88" fill="#FFFFFF" class="word">P</text>

  <!-- 字样（Port 海军蓝，Pulse 青蓝） -->
  <text x="128" y="90" class="word" fill="#0B2740">Port</text>
  <text x="360" y="90" class="word" fill="#38BDF8">Pulse</text>
</svg>