<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <rect width="1200" height="630" fill="#F6F8FB"/>
  <text x="40" y="60" font-family="system-ui, -apple-system" font-size="28" fill="#0B2740">
    Congestion score — inputs → cleaning → normalization → index
  </text>
  <g transform="translate(80,120)" font-family="system-ui, -apple-system">
    <rect x="0" y="0" width="280" height="420" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="20" y="36" font-size="16" fill="#0B2740">Inputs</text>
    <text x="20" y="70" font-size="14" fill="#475569">time-at-anchor</text>
    <text x="20" y="96" font-size="14" fill="#475569">queue length</text>
    <text x="20" y="122" font-size="14" fill="#475569">berth calls</text>

    <rect x="320" y="60" width="280" height="300" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="340" y="96" font-size="16" fill="#0B2740">Cleaning</text>
    <text x="340" y="130" font-size="14" fill="#475569">anomaly clipping (p99)</text>
    <text x="340" y="156" font-size="14" fill="#475569">weekend smoothing</text>
    <text x="340" y="182" font-size="14" fill="#475569">same-day latest wins</text>

    <rect x="640" y="30" width="280" height="360" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="660" y="66" font-size="16" fill="#0B2740">Normalization</text>
    <text x="660" y="100" font-size="14" fill="#475569">per-port z-score → [0,1]</text>
    <text x="660" y="126" font-size="14" fill="#475569">EMA(α=0.2)</text>

    <rect x="940" y="160" width="160" height="120" rx="12" fill="#0B2740"/>
    <text x="960" y="226" font-size="16" fill="#FFFFFF">Index (0–1)</text>

    <path d="M300,210 L320,210" stroke="#94a3b8" stroke-width="2"/>
    <path d="M600,210 L640,210" stroke="#94a3b8" stroke-width="2"/>
    <path d="M920,220 L940,220" stroke="#94a3b8" stroke-width="2"/>
  </g>
</svg>
